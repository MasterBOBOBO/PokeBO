<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>寶可夢學園 - Apple Premium</title>
    <style>
        :root {
            --m-blue: linear-gradient(135deg, #e0f2fe, #bae6fd);
            --m-pink: linear-gradient(135deg, #fce7f3, #fbcfe8);
            --m-green: linear-gradient(135deg, #f0fdf4, #dcfce7);
            --m-purple: linear-gradient(135deg, #f5f3ff, #ede9fe);
            --m-orange: linear-gradient(135deg, #fff7ed, #ffedd5);
            --bg: #fafafb;
            --text: #3a3a3c;
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            font-family: var(--apple-font);
            height: 100dvh; width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .view {
            display: none;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        .view.active { display: flex; }

        #menu-view {
            overflow-y: auto;
            overflow-x: hidden;
            background: var(--bg);
            -webkit-overflow-scrolling: touch;
        }

        .map-header {
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
            width: 100%;
        }

        .map-title { color: var(--text); margin: 0; font-size: 1.5rem; font-weight: 700; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 12px;
            padding: 15px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .level-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            position: relative;
            overflow: visible; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            transition: transform 0.1s;
            /* 讓按鈕成為容器，方便裡面的字體動態調整 */
            container-type: inline-size;
        }
        .level-btn:active { transform: scale(0.92); opacity: 0.9; }

        /* 統一數字大小：若是單字很大，若是三位數則稍微縮小但保持一致性 */
        .level-btn span { 
            font-size: 2.2rem; 
            z-index: 2; 
            position: relative; 
            line-height: 1;
        }

        /* 針對三位數字（如100-151）微調，讓它們看起來不擁擠 */
        .level-btn span.long-num {
            font-size: 1.8rem;
            letter-spacing: -1px;
        }

        .master-ball-mark {
            position: absolute;
            top: -6px; 
            right: -6px;
            width: 28px; 
            height: 28px;
            background-image: url('master_ball.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10; 
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        .bg-blue { background: var(--m-blue); }
        .bg-pink { background: var(--m-pink); }
        .bg-green { background: var(--m-green); }
        .bg-purple { background: var(--m-purple); }
        .bg-orange { background: var(--m-orange); }
        .pokeball-btn { background: linear-gradient(to bottom, #ffcfcf 46%, #ddd 46%, #ddd 54%, #fff 54%); }

        .poke-bg {
            position: absolute; bottom: 0; right: 0;
            width: 55%; height: 55%; opacity: 0.25; 
            background-size: contain; background-repeat: no-repeat; pointer-events: none;
        }

        .section-title {
            grid-column: 1 / -1; font-weight: 600; color: #a1a1a6;
            margin-top: 30px; font-size: 0.8rem; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ''; flex-grow: 1; height: 1px; background: #eee; }

        header { 
            height: 60px; min-height: 60px;
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: #fff; border-bottom: 0.5px solid #ddd;
        }
        #back-btn { background: #f2f2f7; border: none; border-radius: 12px; padding: 8px 15px; color: #007aff; font-weight: 600; cursor: pointer; }

        #canvas-wrapper { flex: 1; position: relative; background: #fff; touch-action: none; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .controls { 
            height: 90px; min-height: 90px;
            display: flex; justify-content: center; gap: 15px; align-items: center; 
            background: #f5f5f7; padding-bottom: env(safe-area-inset-bottom);
        }

        .btn { border: none; border-radius: 14px; padding: 12px 30px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        #clear-btn { background: #e5e5ea; color: #3a3a3c; }
        #catch-btn { background: #bae6fd; color: #007aff; }

        #modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="menu-view" class="view active">
        <div class="map-header">
            <h1 class="map-title">寶可夢學園</h1>
            <div style="color:#a1a1a6; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;">PREMIUM EDITION</div>
        </div>
        <div class="grid-container" id="level-grid"></div>
    </div>

    <div id="game-view" class="view">
        <header>
            <button id="back-btn">← 返回</button>
            <span id="current-title" style="font-weight: 700; font-size: 1.2rem; color: var(--text);"></span>
            <span style="width: 70px;"></span> 
        </header>
        <div id="canvas-wrapper">
            <canvas id="bgCanvas"></canvas> 
            <canvas id="drawCanvas"></canvas>
        </div>
        <div class="controls">
            <button id="clear-btn" class="btn">重新寫</button>
            <button id="catch-btn" class="btn">寫好了</button>
        </div>
        <div id="modal">
            <div id="modal-icon" style="width:150px; height:150px; background-size:contain; background-repeat:no-repeat; background-position:center;"></div>
            <h2 id="modal-title" style="margin:15px 0 0; font-size: 1.5rem;">太棒了！</h2>
            <p id="modal-text" style="color:#86868b; margin-top: 5px;"></p>
            <button class="btn" id="modal-action-btn" style="background:#bae6fd; color:#007aff; margin-top:20px; width: 180px;">繼續學習</button>
        </div>
    </div>

<script>
    const pokeNames151 = ["","妙蛙種子","妙蛙草","妙蛙花","小火龍","火恐龍","噴火龍","傑尼龜","卡咪龜","水箭龜","綠毛蟲","鐵甲蛹","巴大蝶","獨角蟲","鐵殼蛹","大針蜂","波波","比比鳥","大比鳥","小拉達","拉達","烈雀","大嘴雀","阿柏蛇","阿柏怪","皮卡丘","雷丘","穿山鼠","穿山王","尼多蘭","尼多娜","尼多后","尼多朗","尼多力諾","尼多王","皮皮","皮可西","六尾","九尾","胖丁","胖丁","超音蝠","大嘴蝠","走路草","臭臭花","霸王花","派拉斯","派拉斯特","毛球","摩魯蛾","地鼠","三地鼠","喵喵","貓老大","可達鴨","哥達鴨","猴怪","火爆猴","卡蒂狗","風速狗","蚊香蝌蚪","蚊香君","蚊香泳士","凱西","勇基拉","胡地","腕力","豪力","怪力","喇叭芽","口呆花","大食花","瑪瑙水母","毒刺水母","小拳石","隆隆石","隆隆岩","小火馬","烈焰馬","呆呆獸","呆殼獸","小磁怪","三合一磁怪","大蔥鴨","嘟嘟","嘟嘟利","小海獅","白海獅","臭泥","臭臭泥","大舌貝","刺甲貝","鬼斯","鬼斯通","耿鬼","大岩蛇","催眠貘","引夢貘人","大鉗蟹","巨鉗蟹","霹靂電球","頑皮雷彈","蛋蛋","椰蛋樹","卡拉拉","嘎啦嘎啦","飛腿郎","快拳郎","大舌頭","瓦斯彈","雙彈瓦斯","獨角犀牛","鑽角犀獸","吉利蛋","蔓藤怪","袋獸","墨海馬","海刺龍","角金魚","金魚王","海星星","寶石海星","魔牆人偶","飛天螳螂","迷唇姐","電擊獸","鴨嘴火獸","凱羅斯","肯泰羅","鯉魚王","暴鯉龍","拉普拉斯","百變怪","伊布","水伊布","雷伊布","火伊布","多邊獸","菊石獸","多刺菊石獸","化石盔","鐮刀盔","化石翼龍","卡比獸","急凍鳥","閃電鳥","火焰鳥","迷你龍","哈克龍","快龍","超夢","夢幻"];

    const bpmData = [
        ['ㄅ','blue','巴大蝶','12','注音冒險 (聲母)','玻'],['ㄆ','blue','皮卡丘','25',null,'坡'],['ㄇ','blue','喵喵','52',null,'摸'],['ㄈ','blue','鳳王','250',null,'佛'],
        ['ㄉ','pink','呆呆獸','79',null,'得'],['ㄊ','pink','土台龜','389',null,'特'],['ㄋ','pink','尼多王','34',null,'訥'],['ㄌ','pink','拉普拉斯','131',null,'勒'],
        ['ㄍ','green','固拉多','383',null,'哥'],['ㄎ','green','卡比獸','143',null,'科'],['ㄏ','green','火恐龍','5',null,'喝'],
        ['ㄐ','blue','傑尼龜','7',null,'基'],['ㄑ','blue','敲音猴','810',null,'七'],['ㄒ','blue','小火龍','4',null,'西'],
        ['ㄓ','pink','哲爾尼亞斯','716',null,'知'],['ㄔ','pink','超夢','150',null,'吃'],['ㄕ','pink','水箭龜','9',null,'師'],['ㄖ','pink','熱帶龍','357',null,'日'],
        ['ㄗ','green','走路草','43',null,'資'],['ㄘ','green','草苗龜','387',null,'雌'],['ㄙ','green','索爾迦雷歐','791',null,'思'],
        ['ㄧ','blue','伊布','133','注音冒險 (介符)','衣'],['ㄨ','blue','烏波','194',null,'屋'],['ㄩ','blue','圓陸鯊','443',null,'迂'],
        ['ㄚ','orange','阿柏蛇','23','注音冒險 (韻母)','阿'],['ㄛ','orange','波克比','175',null,'喔'],['ㄜ','orange','可達鴨','54',null,'鵝'],['ㄝ','orange','椰蛋樹','103',null,'耶'],
        ['ㄞ','orange','愛管侍','876',null,'哀'],['ㄟ','orange','雷丘','26',null,'A'],['ㄠ','orange','傲骨燕','276',null,'凹'],['ㄡ','orange','歐路普','826',null,'歐'],
        ['ㄢ','orange','安瓢蟲','165',null,'安'],['ㄣ','orange','噴火龍','6',null,'恩'],['ㄤ','orange','胖丁','39',null,'昂'],['ㄥ','orange','耿鬼','94',null,'鞥'],['ㄦ','orange','長耳兔','428',null,'兒'],
        ['ˉ','purple','一聲','➖','聲調練習','一聲'],['ˊ','purple','二聲','✈️',null,'二聲'],['ˇ','purple','三聲','✅',null,'三聲'],['ˋ','purple','四聲','↘️',null,'四聲'],['˙','purple','輕聲','•',null,'輕聲'],
        ['0','pokeball','精靈球','🔴','數字森林','零']
    ];

    for(let i=1; i<=151; i++) {
        bpmData.push([i.toString(), 'orange', `No.${i} ${pokeNames151[i]}`, i.toString(), i===1?'數字 1-151':null, i.toString()]);
    }

    let sessionProgress = {}; 

    let currentLevel = 0;
    const drawCanvas = document.getElementById('drawCanvas');
    const bgCanvas = document.getElementById('bgCanvas');
    const ctx = drawCanvas.getContext('2d');
    const bgCtx = bgCanvas.getContext('2d');
    let isDrawing = false;

    function getImgUrl(id) {
        if (!id || (isNaN(id) && id.length > 3)) return null;
        return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
    }

    function initMenu() {
        const grid = document.getElementById('level-grid');
        grid.innerHTML = '';

        bpmData.forEach((item, index) => {
            if (item[4]) {
                const t = document.createElement('div'); t.className = 'section-title'; t.innerText = item[4]; grid.appendChild(t);
            }
            const btn = document.createElement('button');
            btn.className = `level-btn bg-${item[1]} ${item[1]==='pokeball'?'pokeball-btn':''}`;
            const displayText = item[0] === 'ˉ' ? '' : item[0];
            
            const imgUrl = getImgUrl(item[3]);
            if (imgUrl) {
                const bg = document.createElement('div'); bg.className = 'poke-bg';
                bg.style.backgroundImage = `url('${imgUrl}')`; btn.appendChild(bg);
            }
            
            const span = document.createElement('span'); 
            span.innerText = displayText;
            
            // 修正點：移除原有的 1.2rem 判斷，改用 class
            if (displayText.length >= 3) {
                span.classList.add('long-num');
            }
            
            btn.appendChild(span);

            if (sessionProgress[index]) {
                const ball = document.createElement('div');
                ball.className = 'master-ball-mark';
                btn.appendChild(ball);
            }
            
            btn.addEventListener('click', () => startGame(index));
            grid.appendChild(btn);
        });
    }

    function startGame(idx) {
        currentLevel = idx;
        document.getElementById('menu-view').classList.remove('active');
        document.getElementById('game-view').classList.add('active');
        document.getElementById('current-title').innerText = bpmData[idx][0] === 'ˉ' ? '一聲' : bpmData[idx][0];
        
        ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        speak(bpmData[idx][5] || bpmData[idx][0]);
        setTimeout(resize, 100);
    }

    function resize() {
        const wrapper = document.getElementById('canvas-wrapper');
        drawCanvas.width = bgCanvas.width = wrapper.clientWidth;
        drawCanvas.height = bgCanvas.height = wrapper.clientHeight;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 15; ctx.strokeStyle = '#3a3a3c';
        drawGuide();
    }

    function drawGuide() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        const char = bpmData[currentLevel][0];
        const textToDraw = char === 'ˉ' ? '―' : char;
        const fontSize = Math.min(bgCanvas.width, bgCanvas.height) * 0.65;
        bgCtx.textAlign = 'center'; bgCtx.textBaseline = 'middle';
        bgCtx.font = `bold ${fontSize}px "PingFang TC", sans-serif`;
        const centerX = bgCanvas.width / 2;
        const centerY = bgCanvas.height / 2;
        bgCtx.globalAlpha = 0.05;
        bgCtx.fillStyle = '#000';
        bgCtx.fillText(textToDraw, centerX, centerY);
        bgCtx.globalAlpha = 1.0;
        bgCtx.setLineDash([12, 10]);
        bgCtx.strokeStyle = '#d1d1d6'; bgCtx.lineWidth = 4;
        bgCtx.strokeText(textToDraw, centerX, centerY);
        bgCtx.setLineDash([]);
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW'; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    const startDraw = (e) => {
        if (e.type === 'touchstart') e.preventDefault();
        isDrawing = true;
        const r = drawCanvas.getBoundingClientRect();
        const c = (e.touches) ? e.touches[0] : e;
        ctx.beginPath(); ctx.moveTo(c.clientX - r.left, c.clientY - r.top);
    };

    const moveDraw = (e) => {
        if(!isDrawing) return;
        if (e.type === 'touchmove') e.preventDefault();
        const r = drawCanvas.getBoundingClientRect();
        const c = (e.touches) ? e.touches[0] : e;
        ctx.lineTo(c.clientX - r.left, c.clientY - r.top); ctx.stroke();
    };

    drawCanvas.addEventListener('mousedown', startDraw);
    drawCanvas.addEventListener('touchstart', startDraw, {passive: false});
    window.addEventListener('mousemove', moveDraw);
    window.addEventListener('touchmove', moveDraw, {passive: false});
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);

    document.getElementById('clear-btn').onclick = () => ctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    
    document.getElementById('back-btn').onclick = () => {
        document.getElementById('game-view').classList.remove('active');
        document.getElementById('menu-view').classList.add('active');
        initMenu(); 
    };

    document.getElementById('catch-btn').onclick = () => {
        const dataPixels = ctx.getImageData(0,0,drawCanvas.width, drawCanvas.height).data;
        let pixelCount = 0;
        for(let i=3; i<dataPixels.length; i+=4) if(dataPixels[i]>10) pixelCount++;
        
        if (pixelCount > 500) {
            sessionProgress[currentLevel] = true;
            showSuccess();
        } else {
            speak("再試一次");
            alert("再試一次！請依照虛線描寫。");
        }
    };

    function showSuccess() {
        const data = bpmData[currentLevel];
        const icon = document.getElementById('modal-icon');
        const imgUrl = getImgUrl(data[3]);
        icon.style.backgroundImage = imgUrl ? `url('${imgUrl}')` : '';
        icon.innerText = imgUrl ? '' : '🌟';
        document.getElementById('modal-text').innerText = `順利收服了 ${data[2]}！`;
        document.getElementById('modal').style.display = 'flex';
        speak("好棒喔收服了");
    }

    document.getElementById('modal-action-btn').onclick = () => {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('back-btn').click();
    };

    window.onload = initMenu;
    window.addEventListener('resize', resize);
</script>
</body>
</html>
