<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢學園 V22 (精靈球星星修正)</title>
    <style>
        /* --- 基礎設定 --- */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #f0f8ff;
            font-family: system-ui, "Microsoft JhengHei", sans-serif;
            touch-action: none;
            height: 100vh; width: 100vw;
            cursor: default;
        }

        .view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; flex-direction: column;
        }
        .view.active { display: flex; }

        /* --- 選單 --- */
        #menu-view {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 50%, #FFE0B2 100%);
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        .map-header {
            padding: 15px; text-align: center;
            background: rgba(255,255,255,0.95);
            position: sticky; top: 0; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
        }
        .map-title { color: #2a75bb; margin: 0; font-size: 1.5rem; }
        .map-subtitle { font-size: 0.9rem; color: #666; margin-top: 5px; background: #eee; padding: 2px 10px; border-radius: 10px; }

        .grid-container {
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 20px; padding-bottom: 80px;
        }

        /* 通用按鈕 */
        .level-btn {
            aspect-ratio: 1; border: none; border-radius: 20px;
            font-size: 7rem; 
            font-weight: bold;
            font-family: "KaiTi", "BiauKai", serif; 
            color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            cursor: pointer; transition: transform 0.1s;
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center; 
            line-height: 1; padding: 0; 
        }
        .level-btn:active { transform: translateY(6px); box-shadow: none; }
        .level-btn.small-font { font-size: 4.5rem; }

        /* === V22 重點修正區開始 === */

        /* 精靈球樣式 */
        .pokeball-btn {
            background: linear-gradient(to bottom, #FF0000 46%, #333 46%, #333 54%, #FFF 54%);
            border: 4px solid #333;
            color: white;
        }
        
        /* V22修正: 將精靈球中間結構移到 ::before，避免與星星衝突 */
        .pokeball-btn::before {
            content: ''; position: absolute;
            width: 30%; height: 30%;
            background: white; border: 4px solid #333;
            border-radius: 50%; z-index: 1;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        /* 精靈球上的數字浮水印 */
        .pokeball-text {
            position: relative; z-index: 2;
            color: #333; font-size: 5rem;
            text-shadow: 2px 2px 0px #fff;
        }

        /* 通用的過關星星 (適用於一般按鈕，顯示在右下角) */
        .cleared::after {
            content: '★'; position: absolute; font-size: 2rem;
            color: gold; text-shadow: 0 0 4px black;
            right: 8px; bottom: 8px; z-index: 5;
        }

        /* V22修正: 精靈球過關時的特殊星星樣式 (只顯示星星，位置在下方中間) */
        .pokeball-btn.cleared::after {
            font-size: 3rem; /* 星星大一點 */
            right: auto; bottom: 8%; /* 取消靠右，設定靠下 */
            left: 50%; transform: translateX(-50%); /* 水平置中 */
        }
        
        /* === V22 重點修正區結束 === */


        /* 聲調文字調整 */
        .tone-text-span { font-size: 2.5rem; } 
        .light-tone-span { font-size: 5rem; position: relative; top: -10px; }

        .bg-blue { background-color: #5D9CEC; }
        .bg-pink { background-color: #F08080; }
        .bg-green { background-color: #87D37C; }
        .bg-purple { background-color: #9b59b6; border: 3px solid #8e44ad; }
        .bg-orange { background-color: #FF8C00; border: 3px solid #E65100; color: #fff; }

        .poke-bg {
            position: absolute; bottom: -10px; right: -10px;
            width: 60%; height: 60%; opacity: 0.25; 
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none;
        }

        .section-title {
            grid-column: 1 / -1; text-align: center; font-weight: bold; color: #555;
            margin-top: 15px; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .section-title::before, .section-title::after { content: ''; display: block; width: 40px; height: 3px; background: #ccc; }

        /* --- 遊戲頁面 --- */
        #game-container {
            flex-grow: 1; margin: 10px; background: white;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; overflow: hidden;
            border: 5px solid #FFCB05; position: relative;
            cursor: none; 
        }
        
        @keyframes shake {
            0% { transform: translateX(0); } 25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.4s ease-in-out; border-color: #ff5e5e !important; }

        header {
            height: 60px; background: #FFCB05;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: bold; color: #2a75bb; font-size: 1.2rem;
        }
        #back-btn { background: white; border: 2px solid #2a75bb; border-radius: 20px; padding: 8px 20px; font-weight: bold; font-size: 1rem; cursor: pointer;}

        #canvas-wrapper {
            position: relative; flex-grow: 1; width: 100%;
            background: radial-gradient(#fafafa 15%, transparent 16%) 0 0,
                        radial-gradient(#fafafa 15%, transparent 16%) 10px 10px;
            background-size: 20px 20px;
            overflow: hidden; touch-action: none;
        }

        canvas { position: absolute; top: 0; left: 0; }
        
        #magic-pencil {
            position: absolute; pointer-events: none; font-size: 40px; z-index: 9999;
            transform: translate(-5px, -35px); display: none;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .controls {
            height: 90px; display: flex; justify-content: center;
            gap: 20px; align-items: center; background: #fff; border-top: 1px solid #eee;
        }
        .btn {
            border: none; border-radius: 50px; padding: 15px 30px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }
        #clear-btn { background-color: #ff5e5e; color: white; }
        #catch-btn { background-color: #3b4cca; color: white; }

        /* 彈窗 */
        #modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 99999;
            text-align: center; color: white; backdrop-filter: blur(5px);
            cursor: default;
        }
        .modal-icon {
            width: 220px; height: 220px; 
            background-color: white; border-radius: 50%;
            margin-bottom: 20px; border: 8px solid gold;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-icon.emoji-icon { font-size: 120px; line-height: 220px; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        
        .modal-btn {
            background: gold; color: black; margin-top: 30px;
            padding: 15px 50px; font-size: 1.8rem;
            border: none; border-radius: 50px; font-weight: bold;
            box-shadow: 0 6px 0 #b8860b; cursor: pointer;
        }
        .modal-btn:active { transform: translateY(6px); box-shadow: none; }

    </style>
</head>
<body>

    <div id="menu-view" class="view active">
        <div class="map-header">
            <h1 class="map-title">寶可夢學園</h1>
            <div class="map-subtitle">V22 精靈球星星修正版</div>
        </div>
        <div class="grid-container" id="level-grid"></div>
    </div>

    <div id="game-view" class="view">
        <div id="game-container">
            <header>
                <button id="back-btn">← 回去</button>
                <span id="current-title">練習</span>
                <span style="width: 50px;"></span> 
            </header>

            <div id="canvas-wrapper">
                <canvas id="bgCanvas"></canvas> 
                <canvas id="drawCanvas"></canvas>
                <div id="magic-pencil">✏️</div>
            </div>

            <div class="controls">
                <button id="clear-btn" class="btn">重寫</button>
                <button id="catch-btn" class="btn">寫好了！</button>
            </div>

            <div id="modal">
                <div class="modal-icon" id="modal-icon"></div>
                <h2 id="modal-title" style="font-size: 2.5rem; margin: 10px;"></h2>
                <p id="modal-text" style="font-size: 1.8rem; color: #FFCB05; margin: 0 20px;"></p>
                <button class="modal-btn" id="modal-action-btn"></button>
            </div>
        </div>
    </div>

<script>
    const pokeNames151 = [
        "蛋", "妙蛙種子", "妙蛙草", "妙蛙花", "小火龍", "火恐龍", "噴火龍", "傑尼龜", "卡咪龜", "水箭龜", 
        "綠毛蟲", "鐵甲蛹", "巴大蝶", "獨角蟲", "鐵殼蛹", "大針蜂", "波波", "比比鳥", "大比鳥", "小拉達", 
        "拉達", "烈雀", "大嘴雀", "阿柏蛇", "阿柏怪", "皮卡丘", "雷丘", "穿山鼠", "穿山王", "尼多蘭", 
        "尼多娜", "尼多后", "尼多朗", "尼多力諾", "尼多王", "皮皮", "皮可西", "六尾", "九尾", "胖丁", 
        "胖可丁", "超音蝠", "大嘴蝠", "走路草", "臭臭花", "霸王花", "派拉斯", "派拉斯特", "毛球", "摩魯蛾", 
        "地鼠", "三地鼠", "喵喵", "貓老大", "可達鴨", "哥達鴨", "猴怪", "火爆猴", "卡蒂狗", "風速狗", 
        "蚊香蝌蚪", "蚊香君", "蚊香泳士", "凱西", "勇基拉", "胡地", "腕力", "豪力", "怪力", "喇叭芽", 
        "口呆花", "大食花", "瑪瑙水母", "毒刺水母", "小拳石", "隆隆石", "隆隆岩", "小火馬", "烈焰馬", "呆呆獸", 
        "呆殼獸", "小磁怪", "三合一磁怪", "大蔥鴨", "嘟嘟", "嘟嘟利", "小海獅", "白海獅", "臭泥", "臭臭泥", 
        "大舌貝", "刺甲貝", "鬼斯", "鬼斯通", "耿鬼", "大岩蛇", "催眠貘", "引夢貘人", "大鉗蟹", "巨鉗蟹", 
        "霹靂電球", "頑皮雷彈", "蛋蛋", "椰蛋樹", "卡拉卡拉", "嘎啦嘎啦", "飛腿郎", "快拳郎", "大舌頭", "瓦斯彈", 
        "雙彈瓦斯", "獨角犀牛", "鑽角犀獸", "吉利蛋", "蔓藤怪", "袋獸", "墨海馬", "海刺龍", "角金魚", "金魚王", 
        "海星星", "寶石海星", "魔牆人偶", "飛天螳螂", "迷唇姐", "電擊獸", "鴨嘴火獸", "凱羅斯", "肯泰羅", "鯉魚王", 
        "暴鯉龍", "拉普拉斯", "百變怪", "伊布", "水伊布", "雷伊布", "火伊布", "多邊獸", "菊石獸", "多刺菊石獸", 
        "化石盔", "鐮刀盔", "化石翼龍", "卡比獸", "急凍鳥", "閃電鳥", "火焰鳥", "迷你龍", "哈克龍", "快龍", 
        "超夢", "夢幻"
    ];

    const bpmData = [
        ['ㄅ', 'blue', '巴大蝶', '12', '注音冒險', '玻'], ['ㄆ', 'blue', '皮卡丘', '25', null, '坡'], 
        ['ㄇ', 'blue', '喵喵', '52', null, '摸'], ['ㄈ', 'blue', '鳳王', '250', null, '佛'],
        ['ㄉ', 'pink', '呆呆獸', '79', null, '得'], ['ㄊ', 'pink', '土台龜', '389', null, '特'], 
        ['ㄋ', 'pink', '尼多王', '34', null, '訥'], ['ㄌ', 'pink', '拉普拉斯', '131', null, '勒'],
        ['ㄍ', 'green', '固拉多', '383', null, '哥'], ['ㄎ', 'green', '卡比獸', '143', null, '科'], 
        ['ㄏ', 'green', '火恐龍', '5', null, '喝'],
        ['ㄐ', 'blue', '傑尼龜', '7', null, '基'], ['ㄑ', 'blue', '敲音猴', '810', null, '七'], 
        ['ㄒ', 'blue', '小火龍', '4', null, '西'], 
        ['ㄓ', 'pink', '哲爾尼亞斯', '716', null, '知'], ['ㄔ', 'pink', '超夢', '150', null, '吃'], 
        ['ㄕ', 'pink', '水箭龜', '9', null, '師'], ['ㄖ', 'pink', '熱帶龍', '357', null, '熱'], 
        ['ㄗ', 'green', '走路草', '43', null, '資'], ['ㄘ', 'green', '草苗龜', '387', null, '雌'], 
        ['ㄙ', 'green', '索爾迦雷歐', '791', null, '思'],
        ['ㄧ', 'blue', '伊布', '133', null, '衣'], ['ㄨ', 'blue', '烏波', '194', null, '屋'], ['ㄩ', 'blue', '圓陸鯊', '443', null, '迂'],
        ['ㄚ', 'pink', '阿柏蛇', '23', null, '阿'], ['ㄛ', 'pink', '波克比', '175', null, '喔'], 
        ['ㄜ', 'pink', '可達鴨', '54', null, '鵝'], ['ㄝ', 'pink', '椰蛋樹', '103', null, '耶'],
        ['ㄞ', 'green', '愛管侍', '876', null, '哀'], ['ㄟ', 'green', '雷丘', '26', null, 'A'],
        ['ㄠ', 'green', '傲骨燕', '276', null, '凹'], ['ㄡ', 'green', '歐路普', '826', null, '歐'],
        ['ㄢ', 'blue', '安瓢蟲', '165', null, '安'], ['ㄣ', 'blue', '噴火龍', '6', null, '恩'], 
        ['ㄤ', 'blue', '胖丁', '39', null, '昂'], ['ㄥ', 'blue', '耿鬼', '94', null, '鞥'],
        ['ㄦ', 'pink', '長耳兔', '428', null, '兒'],
        
        [' ', 'purple', '一聲 (原本的聲音)', '➖', '聲調練習', '一聲'], 
        ['ˊ', 'purple', '二聲 (往上飛)', '✈️', null, '二聲'],
        ['ˇ', 'purple', '三聲 (打勾勾)', '✅', null, '三聲'], 
        ['ˋ', 'purple', '四聲 (溜滑梯)', '↘️', null, '四聲'], 
        ['˙', 'purple', '輕聲 (點一下)', '•', null, '輕聲'],
        
        ['0', 'pokeball', '0 (像精靈球)', '🔴', '數字森林 (1-151)', '零']
    ];

    for (let i = 1; i <= 151; i++) {
        let name = pokeNames151[i];
        bpmData.push([
            i.toString(), 'orange', `No.${i} ${name}`, i.toString(), null, i.toString()
        ]);
    }

    let currentLevelIndex = 0;
    let synth = window.speechSynthesis;
    let voiceTW = null;
    let drawCanvas = document.getElementById('drawCanvas');
    let bgCanvas = document.getElementById('bgCanvas');
    let ctx = drawCanvas.getContext('2d', { willReadFrequently: true });
    let bgCtx = bgCanvas.getContext('2d');
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    const magicPencil = document.getElementById('magic-pencil');

    function getImgUrl(id) {
        if (isNaN(id) && id.length > 3) return null; 
        if (id === '🔴' || id === '➖' || id === '✈️' || id === '✅' || id === '↘️' || id === '•') return null;
        return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
    }

    function loadVoices() {
        const voices = synth.getVoices();
        voiceTW = voices.find(v => v.name.includes('Google') && v.lang === 'zh-TW') ||
                  voices.find(v => v.name === 'Mei-Jia') ||
                  voices.find(v => v.lang === 'zh-TW');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }

    function initMenu() {
        loadVoices();
        const grid = document.getElementById('level-grid');
        grid.innerHTML = '';
        bpmData.forEach((item, index) => {
            if (item[4]) {
                const title = document.createElement('div');
                title.className = 'section-title'; title.innerText = item[4]; grid.appendChild(title);
            }
            const btn = document.createElement('button');
            
            if (item[1] === 'pokeball') {
                btn.className = `level-btn pokeball-btn`;
                const txt = document.createElement('span');
                txt.innerText = item[0];
                txt.className = 'pokeball-text';
                btn.appendChild(txt);
            } else {
                btn.className = `level-btn bg-${item[1]}`;
                if (item[0].length >= 3) btn.classList.add('small-font');

                const imgUrl = getImgUrl(item[3]);
                if (imgUrl) {
                    const bg = document.createElement('div');
                    bg.className = 'poke-bg'; bg.style.backgroundImage = `url('${imgUrl}')`;
                    btn.appendChild(bg);
                }

                const txt = document.createElement('span');
                txt.style.position = 'relative'; txt.style.zIndex = '2';
                
                if(item[0] === '˙') {
                     txt.innerHTML = '<span class="light-tone-span">˙</span>';
                } else if (item[0] === ' ') {
                     txt.innerHTML = '<span class="tone-text-span">一聲</span>';
                } else {
                     txt.innerText = item[0];
                }
                btn.appendChild(txt);
            }
            
            btn.onclick = () => startGame(index);
            grid.appendChild(btn);
        });
    }

    function startGame(index) {
        currentLevelIndex = index;
        const data = bpmData[index];
        document.getElementById('menu-view').classList.remove('active');
        document.getElementById('game-view').classList.add('active');
        
        let titleText = data[0];
        if(titleText === ' ') titleText = "一聲 (空白)";
        document.getElementById('current-title').innerText = `練習：${titleText}`;
        document.getElementById('modal').style.display = 'none';

        setTimeout(() => {
            resizeCanvas();
        }, 100);
        
        let sound = data[5] ? data[5] : data[0]; 
        let speakText = "";
        
        if (data[1] === 'orange' && data[0] !== '0') {
            let name = data[2].split(' ')[1]; 
            speakText = `${sound} ... (停頓) ... ${name}`;
        } else if (data[1] === 'purple') {
            let simpleName = data[2].split(' ')[0]; 
            speakText = `${simpleName}，... ${simpleName}的${sound}`;
        } else if (data[0] === '0') {
            speakText = "零 ... (停頓) ... 像精靈球的零";
        } else if (data[0] === ' ') {
            speakText = "一聲 ... (停頓) ... 一聲不需要寫，直接按寫好了";
        } else {
            let pokeName = data[2];
            if (data[0] === 'ㄣ') pokeName = '噴火龍'; if (data[0] === 'ㄟ') pokeName = '雷丘';
            if (data[0] === 'ㄥ') pokeName = '耿鬼'; if (data[0] === 'ㄤ') pokeName = '胖丁';
            speakText = `${sound} ... (停頓) ... ${pokeName} ... (停頓) ... ${sound}`;
        }
        speak(speakText);
    }

    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        const rect = wrapper.getBoundingClientRect();
        drawCanvas.width = bgCanvas.width = rect.width;
        drawCanvas.height = bgCanvas.height = rect.height;
        
        drawDashedGuide(bgCtx, '#ccc');
        
        const data = bpmData[currentLevelIndex];
        if (data[1] === 'orange' || data[1] === 'pokeball') ctx.strokeStyle = '#E65100';
        else if (data[1] === 'purple') ctx.strokeStyle = '#8e44ad';
        else ctx.strokeStyle = '#2a75bb';
        
        ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.lineWidth = 25; 
    }

    function drawDashedGuide(context, color) {
        const data = bpmData[currentLevelIndex];
        context.clearRect(0, 0, context.canvas.width, context.canvas.height);
        
        if (data[0] === ' ') return;

        let fontSizeRatio = 0.7;
        if (data[0].length >= 3) fontSizeRatio = 0.5;
        
        const fontSize = Math.min(context.canvas.width, context.canvas.height) * fontSizeRatio;
        context.textAlign = "center"; context.textBaseline = "middle";
        let x = context.canvas.width / 2;
        let y = context.canvas.height / 2 + 20;
        let yOffset = (data[0] === '˙') ? -20 : 0;

        context.strokeStyle = color; context.lineWidth = 6; 
        context.setLineDash([15, 15]); 

        if (data[0] === '˙') {
            context.beginPath();
            context.arc(x, context.canvas.height * 0.3, 30, 0, Math.PI * 2);
            context.stroke();
        } else {
            context.font = `900 ${fontSize}px "KaiTi", "BiauKai", sans-serif`;
            context.strokeText(data[0], x, y + yOffset);
        }
        context.setLineDash([]);
    }

    function getPos(e) {
        const rect = drawCanvas.getBoundingClientRect();
        let cx, cy;
        if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
        else { cx = e.clientX; cy = e.clientY; }
        return { x: cx - rect.left, y: cy - rect.top };
    }

    function movePencil(x, y) {
        magicPencil.style.display = 'block';
        magicPencil.style.left = x + 'px'; magicPencil.style.top = y + 'px';
    }

    function startDrawing(e) { 
        e.preventDefault(); isDrawing = true; 
        const pos = getPos(e); lastX = pos.x; lastY = pos.y; 
        movePencil(lastX, lastY);
        ctx.beginPath(); ctx.arc(lastX, lastY, ctx.lineWidth/2, 0, Math.PI*2); ctx.fillStyle = ctx.strokeStyle; ctx.fill(); ctx.beginPath(); 
    }

    function draw(e) { 
        e.preventDefault(); const pos = getPos(e); movePencil(pos.x, pos.y);
        if (isDrawing) {
             ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(pos.x, pos.y); ctx.stroke(); lastX = pos.x; lastY = pos.y; 
        }
    }

    function stopDrawing() { isDrawing = false; ctx.beginPath(); }

    drawCanvas.addEventListener('mousedown', startDrawing); drawCanvas.addEventListener('mousemove', draw);
    drawCanvas.addEventListener('mouseup', stopDrawing); drawCanvas.addEventListener('mouseout', stopDrawing);
    drawCanvas.addEventListener('touchstart', startDrawing, {passive: false}); drawCanvas.addEventListener('touchmove', draw, {passive: false});
    drawCanvas.addEventListener('touchend', stopDrawing);

    function checkWriting() {
        const width = drawCanvas.width; const height = drawCanvas.height;
        const checkW = 100; const checkH = 100;
        const tempC = document.createElement('canvas'); tempC.width = checkW; tempC.height = checkH;
        const tempCtx = tempC.getContext('2d');
        const data = bpmData[currentLevelIndex];

        if (data[0] === ' ') {
            tempCtx.drawImage(drawCanvas, 0, 0, width, height, 0, 0, checkW, checkH);
            const ink = countPixels(tempCtx, checkW, checkH);
            if (ink < 100) return "pass"; 
            else return "messy";
        }

        let fontSizeRatio = 0.7;
        if (data[0].length >= 3) fontSizeRatio = 0.5;
        let x = checkW / 2; let y = checkH / 2 + 5;

        tempCtx.fillStyle = '#FF0000';
        tempCtx.strokeStyle = '#FF0000';
        tempCtx.lineWidth = 25; 

        if (data[0] === '˙') {
            tempCtx.beginPath();
            tempCtx.arc(x, checkH * 0.3, 15, 0, Math.PI * 2); 
            tempCtx.fill();
            tempCtx.stroke();
        } else {
            tempCtx.font = `900 ${checkW * fontSizeRatio}px "KaiTi", "BiauKai", sans-serif`; 
            tempCtx.textAlign = "center"; tempCtx.textBaseline = "middle";
            tempCtx.strokeText(data[0], x, y);
            tempCtx.fillText(data[0], x, y);
        }

        const targetPixels = countPixels(tempCtx, checkW, checkH);
        if (targetPixels === 0) return "pass"; 

        tempCtx.globalCompositeOperation = 'source-over';
        tempCtx.clearRect(0,0,checkW,checkH);
        tempCtx.drawImage(drawCanvas, 0, 0, width, height, 0, 0, checkW, checkH);
        const totalInkPixels = countPixels(tempCtx, checkW, checkH);

        tempCtx.globalCompositeOperation = 'source-in';
        if (data[0] === '˙') {
            tempCtx.beginPath(); tempCtx.arc(x, checkH * 0.3, 15, 0, Math.PI * 2); 
            tempCtx.fill(); tempCtx.stroke();
        } else {
            tempCtx.strokeStyle = '#FF0000'; tempCtx.lineWidth = 25; tempCtx.strokeText(data[0], x, y);
            tempCtx.fillStyle = '#FF0000'; tempCtx.fillText(data[0], x, y);
        }
        
        const overlapPixels = countPixels(tempCtx, checkW, checkH);

        if (totalInkPixels < 20) return "empty"; 
        
        const accuracy = overlapPixels / totalInkPixels;
        const completion = overlapPixels / targetPixels;

        if (accuracy > 0.15 && completion > 0.01) return "pass";
        
        if (completion <= 0.01) return "empty";
        return "messy";
    }

    function countPixels(context, w, h) {
        const imgData = context.getImageData(0, 0, w, h);
        const data = imgData.data;
        let count = 0;
        for(let i = 3; i < data.length; i += 4) { if(data[i] > 50) count++; }
        return count;
    }

    function showModal(type, title, text, imgId) {
        const modal = document.getElementById('modal');
        const mTitle = document.getElementById('modal-title');
        const mText = document.getElementById('modal-text');
        const mIcon = document.getElementById('modal-icon');
        const mBtn = document.getElementById('modal-action-btn');
        const container = document.getElementById('game-container');

        modal.style.display = 'flex';
        mTitle.innerText = title; mText.innerText = text;
        const imgUrl = getImgUrl(imgId);
        
        if (type === 'success' && imgUrl) {
            mIcon.innerText = ''; mIcon.style.backgroundImage = `url('${imgUrl}')`; mIcon.classList.remove('emoji-icon');
            mIcon.style.border = '8px solid gold';
            mBtn.innerText = "下一關 →"; mBtn.onclick = goBackToMenu; mBtn.style.background = 'gold'; mBtn.style.color = 'black';
        } else {
            mIcon.style.backgroundImage = 'none'; mIcon.innerText = (type === 'success') ? imgId : (type === 'empty' ? '❓' : '❌');
            mIcon.classList.add('emoji-icon');
            if (type === 'success') {
                 mIcon.style.border = '8px solid gold'; mBtn.innerText = "下一關 →"; mBtn.onclick = goBackToMenu; mBtn.style.background = 'gold'; mBtn.style.color = 'black';
            } else {
                mIcon.style.border = '8px solid #ff5e5e'; mBtn.innerText = "再試一次"; mBtn.style.background = '#ff5e5e'; mBtn.style.color = 'white';
                mBtn.onclick = () => { modal.style.display = 'none'; };
                container.classList.add('shake'); setTimeout(() => container.classList.remove('shake'), 500);
            }
        }
    }

    document.getElementById('back-btn').addEventListener('click', goBackToMenu);
    document.getElementById('clear-btn').addEventListener('click', () => {
        ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        speak("加油");
    });
    
    document.getElementById('catch-btn').addEventListener('click', () => {
        const result = checkWriting();
        const data = bpmData[currentLevelIndex];

        if (result === "pass") {
            let rewardText, speakText;
            if (data[1] === 'orange' && data[0] !== '0') {
                let name = data[2].split(' ')[1];
                rewardText = `${data[0]} - ${name}`;
                speakText = `太棒了！收服${name}！`;
            } else if (data[0] === '0') { 
                rewardText = `圖鑑 ${data[0]}`;
                speakText = "得到寶可夢蛋！";
            } else if (data[0] === ' ') {
                rewardText = "學會了一聲！";
                speakText = "太棒了！學會了一聲！";
            } else {
                rewardText = `${data[2]}`;
                speakText = `太棒了！收服${data[2]}！`;
            }
            speak(speakText);
            const grid = document.getElementById('level-grid');
            const buttons = grid.querySelectorAll('button');
            if(buttons[currentLevelIndex]) buttons[currentLevelIndex].classList.add('cleared');
            showModal('success', '成功！', rewardText, data[3]);
        } else if (result === "empty") {
            speak("咦？空空的？要畫在線框裡面喔！");
            showModal('empty', '沒畫到？', '要畫在虛線框框裡！', '❓');
        } else {
            speak("歪掉了，要寫在框框裡面喔");
            showModal('messy', '歪掉囉！', '要寫在框框裡面！', '❌');
        }
    });

    function goBackToMenu() {
        document.getElementById('game-view').classList.remove('active');
        document.getElementById('menu-view').classList.add('active');
        document.getElementById('modal').style.display = 'none';
        magicPencil.style.display = 'none'; 
    }

    function speak(text) {
        if (!synth) return;
        synth.cancel();
        const cleanText = text.replace(/\(停頓\)/g, ""); 
        const u = new SpeechSynthesisUtterance(cleanText);
        if (voiceTW) { u.voice = voiceTW; }
        u.lang = 'zh-TW'; 
        u.rate = 1; 
        u.pitch = 1.1;
        synth.speak(u);
    }

    window.onload = function() {
        loadVoices();
        initMenu();
        window.addEventListener('resize', resizeCanvas);
    };

</script>
</body>
